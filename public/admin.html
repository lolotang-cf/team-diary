<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理看板 - 工作日报系统</title>
    <link rel="stylesheet" href="/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- 顶部导航 -->
        <header class="admin-header">
            <div class="header-left">
                <div class="header-icon">📊</div>
                <div>
                    <h1>管理看板</h1>
                    <p class="subtitle">团队工作日报实时监控</p>
                </div>
            </div>
            <div class="header-right">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span id="currentTime"></span>
                </div>
                <button onclick="location.reload()" class="btn-icon" title="刷新">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                </button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <section class="stats-grid">
            <div class="stat-card stat-blue">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="totalEmployees">-</span>
                    <span class="stat-label">团队总人数</span>
                </div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="todaySubmitted">-</span>
                    <span class="stat-label">今日已提交</span>
                </div>
            </div>
            <div class="stat-card stat-purple">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="todayRate">-%</span>
                    <span class="stat-label">提交率</span>
                </div>
            </div>
        </section>

        <!-- 筛选器 -->
        <section class="filters-bar">
            <div class="filter-item">
                <label>📅 日期</label>
                <input type="date" id="filterDate" onchange="loadReports(); loadOverview();">
            </div>
            <div class="filter-item">
                <label>🏢 部门</label>
                <select id="filterDept" onchange="loadReports()">
                    <option value="">全部部门</option>
                    <option value="南昌人才发展主管">南昌人才发展主管</option>
                    <option value="太原人才发展主管">太原人才发展主管</option>
                    <option value="太原培训与人才发展主管">太原培训与人才发展主管</option>
                    <option value="太原培训专员">太原培训专员</option>
                    <option value="晋中培训专员">晋中培训专员</option>
                    <option value="长沙培训专员">长沙培训专员</option>
                </select>
            </div>
            <div class="filter-item filter-search">
                <label>🔍 搜索</label>
                <input type="text" id="filterKeyword" placeholder="搜索员工/内容..." onkeyup="debounceSearch()">
            </div>
            <button onclick="loadReports()" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                查询
            </button>
        </section>

        <!-- 标签页 -->
        <nav class="tabs">
            <button class="tab active" onclick="switchTab('overview', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                今日智览
            </button>
            <button class="tab" onclick="switchTab('reports', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                日报列表
            </button>
            <button class="tab" onclick="switchTab('stats', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                统计图表
            </button>
            <button class="tab" onclick="switchTab('team', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                团队管理
            </button>
        </nav>

        <!-- 今日智览 -->
        <section class="tab-content active" id="overviewTab">
            <!-- 数字概览 -->
            <div class="overview-metrics" id="overviewMetrics">
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewSubmitted">-</div>
                    <div class="overview-metric-label">今日提交</div>
                </div>
                <div class="overview-metric-divider"></div>
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewTotal">-</div>
                    <div class="overview-metric-label">团队总人数</div>
                </div>
                <div class="overview-metric-divider"></div>
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewTaskCount">-</div>
                    <div class="overview-metric-label">任务总数</div>
                </div>
                <div class="overview-metric-divider"></div>
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewDoneRate" style="color:#3B6D11">-</div>
                    <div class="overview-metric-label">完成/进行中</div>
                </div>
            </div>

            <div class="overview-grid">
                <!-- 提交状态 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            提交状态
                        </h3>
                    </div>
                    <div id="overviewSubmitList" class="overview-submit-list"></div>
                </div>

                <!-- 工作重点 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                            工作重点
                        </h3>
                    </div>
                    <div id="overviewWorkHighlights" class="overview-tag-cloud"></div>
                </div>
            </div>

            <div class="overview-grid">
                <!-- 困难汇总 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            遇到的困难
                        </h3>
                    </div>
                    <div id="overviewDifficulties" class="overview-issue-list"></div>
                </div>

                <!-- 明日计划 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                            明日计划
                        </h3>
                    </div>
                    <div id="overviewPlans" class="overview-plan-list"></div>
                </div>
            </div>
        </section>

        <!-- 日报列表 -->
        <section class="tab-content" id="reportsTab">
            <div class="card">
                <div class="card-header">
                    <h3>📋 日报列表</h3>
                    <span class="report-count" id="reportCount"></span>
                </div>
                <div class="table-responsive">
                    <table class="reports-table">
                        <thead>
                            <tr>
                                <th>员工</th>
                                <th>部门</th>
                                <th>日期</th>
                                <th>提交时间</th>
                                <th>任务数</th>
                                <th>任务摘要</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reportsBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 统计图表 -->
        <section class="tab-content" id="statsTab">
            <div class="charts-grid">
                <div class="card chart-card">
                    <h3>📊 部门任务分布</h3>
                    <canvas id="deptChart"></canvas>
                </div>
                <div class="card chart-card">
                    <h3>📈 每日提交趋势</h3>
                    <canvas id="trendChart"></canvas>
                </div>
                <div class="card chart-card">
                    <h3>✅ 完成情况</h3>
                    <canvas id="completionChart"></canvas>
                </div>
            </div>
        </section>

        <!-- 团队管理 -->
        <section class="tab-content" id="teamTab">
            <div class="card">
                <div class="card-header">
                    <h3>👥 团队成员</h3>
                    <button onclick="showAddEmployee()" class="btn btn-primary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        添加成员
                    </button>
                </div>
                <div class="employee-grid" id="employeeList"></div>
            </div>
        </section>
    </div>

    <!-- 日报详情弹窗 -->
    <div class="modal-overlay hidden" id="reportModal" onclick="closeModalOnOverlay(event)">
        <div class="modal">
            <div class="modal-header">
                <h3>📋 日报详情</h3>
                <button onclick="closeModal()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <h4>💬 添加批注</h4>
                <textarea id="adminNote" rows="3" placeholder="输入批注内容..."></textarea>
                <button onclick="submitNote()" class="btn btn-primary">发送批注</button>
            </div>
            <div class="notes-list" id="notesList"></div>
        </div>
    </div>

    <!-- 添加员工弹窗 -->
    <div class="modal-overlay hidden" id="addEmployeeModal" onclick="closeAddEmployeeModalOnOverlay(event)">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>➕ 添加成员</h3>
                <button onclick="closeAddEmployeeModal()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="newEmpName" placeholder="输入成员姓名">
                </div>
                <div class="form-group">
                    <label>部门/职位</label>
                    <select id="newEmpDept">
                        <option value="南昌人才发展主管">南昌人才发展主管</option>
                        <option value="太原人才发展主管">太原人才发展主管</option>
                        <option value="太原培训与人才发展主管">太原培训与人才发展主管</option>
                        <option value="太原培训专员">太原培训专员</option>
                        <option value="晋中培训专员">晋中培训专员</option>
                        <option value="长沙培训专员">长沙培训专员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="addEmployee()" class="btn btn-primary" style="width:100%">确认添加</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 全局变量
        let socket = null;
        let currentReportId = null;
        let employees = [];
        let charts = {};

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            setDefaultDate();
            loadStats();
            loadReports();
            loadEmployees();
            loadOverview();
            startClock();
        });

        // Socket.IO
        function initSocket() {
            socket = io();
            socket.on('report_added', (data) => {
                showToast(`${data.employee_name} 提交了新日报`);
                loadReports();
                loadStats();
                loadOverview();
            });
            socket.on('report_updated', (data) => {
                loadReports();
                loadStats();
                loadOverview();
            });
        }

        // 时钟
        function startClock() {
            setInterval(() => {
                document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
            }, 1000);
        }

        // 设置默认日期
        function setDefaultDate() {
            document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
        }

        // 加载统计
        async function loadStats() {
            const today = new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`/api/stats?start_date=${getDateRange()}&end_date=${today}`);
                const data = await res.json();
                if (data.success) {
                    updateStatsCards(data.data);
                    updateCharts(data.data);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function getDateRange() {
            const date = new Date();
            date.setDate(date.getDate() - 30);
            return date.toISOString().split('T')[0];
        }

        // 更新统计卡片
        function updateStatsCards(stats) {
            document.getElementById('totalEmployees').textContent = stats.todayStats.total;
            document.getElementById('todaySubmitted').textContent = stats.todayStats.submitted;
            document.getElementById('todayRate').textContent = stats.todayStats.rate + '%';
        }

        // 加载日报列表
        async function loadReports() {
            const date = document.getElementById('filterDate').value;
            const dept = document.getElementById('filterDept').value;
            const keyword = document.getElementById('filterKeyword').value;

            let url = '/api/reports/all?';
            if (date) url += `date=${date}&`;
            if (dept) url += `department=${dept}&`;
            if (keyword) url += `keyword=${encodeURIComponent(keyword)}&`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    renderReports(data.data);
                    document.getElementById('reportCount').textContent = `共 ${data.data.length} 条`;
                }
            } catch (err) {
                showToast('加载失败', 'error');
            }
        }

        // 渲染日报列表
        function renderReports(reports) {
            const tbody = document.getElementById('reportsBody');
            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = reports.map(r => {
                let tasks = [];
                try {
                    tasks = JSON.parse(r.tasks || '[]');
                } catch (e) {
                    tasks = [];
                }
                const taskCount = tasks.length;
                const taskSummary = tasks.slice(0, 2).map(t => t.desc).join('; ');
                
                return `
                <tr onclick="showReportDetail(${r.id})">
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar">${r.employee_name.charAt(0)}</div>
                            <span>${r.employee_name}</span>
                        </div>
                    </td>
                    <td><span class="dept-badge">${r.department}</span></td>
                    <td><span class="date-text">${r.report_date}</span></td>
                    <td><span class="date-text">${r.created_at ? new Date(r.created_at).toLocaleString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '-'}</span></td>
                    <td><span class="task-count">${taskCount} 项</span></td>
                    <td class="task-cell">${taskSummary ? taskSummary.substring(0, 50) + (taskSummary.length > 50 ? '...' : '') : '-'}</td>
                    <td><button onclick="event.stopPropagation(); showReportDetail(${r.id})" class="btn btn-sm btn-outline">查看</button></td>
                </tr>
                `;
            }).join('');
        }

        function getStatusClass(status) {
            if (status === '已完成') return 'status-green';
            if (status === '进行中' || status === '部分完成') return 'status-yellow';
            if (status === '已延期') return 'status-red';
            return 'status-gray';
        }

        // 显示日报详情
        async function showReportDetail(id) {
            currentReportId = id;
            const res = await fetch(`/api/reports/all`);
            const data = await res.json();
            const report = data.data.find(r => r.id === id);

            if (!report) return;

            let tasksHtml = '';
            try {
                const tasks = JSON.parse(report.tasks || '[]');
                if (tasks.length > 0) {
                    tasksHtml = '<div class="detail-block"><span class="detail-label">📌 工作任务</span>';
                    tasks.forEach((task, index) => {
                        tasksHtml += `
                            <div class="task-detail-item">
                                <div class="task-detail-header">
                                    <span class="task-detail-num">任务 ${index + 1}</span>
                                    <span class="task-detail-status ${getStatusClass(task.status)}">${task.status || '未设置'}</span>
                                </div>
                                <div class="task-detail-desc">${task.desc || '无描述'}</div>
                            </div>
                        `;
                    });
                    tasksHtml += '</div>';
                }
            } catch (e) {
                tasksHtml = '';
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <span class="detail-label">员工</span>
                        <span class="detail-value">${report.employee_name}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">部门</span>
                        <span class="detail-value">${report.department}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">日期</span>
                        <span class="detail-value">${report.report_date}</span>
                    </div>
                </div>
                ${tasksHtml}
                ${report.difficulties ? `<div class="detail-block"><span class="detail-label">🚧 遇到困难</span><div class="detail-content has-issue">${report.difficulties}</div></div>` : ''}
                ${report.next_plan ? `<div class="detail-block"><span class="detail-label">💡 明日计划</span><div class="detail-content">${report.next_plan}</div></div>` : ''}
                ${report.notes ? `<div class="detail-block"><span class="detail-label">📝 备注</span><div class="detail-content">${report.notes}</div></div>` : ''}
            `;

            await loadNotes(id);
            document.getElementById('reportModal').classList.remove('hidden');
        }

        // 点击遮罩关闭弹窗
        function closeModalOnOverlay(event) {
            if (event.target === document.getElementById('reportModal')) {
                closeModal();
            }
        }

        function closeAddEmployeeModalOnOverlay(event) {
            if (event.target === document.getElementById('addEmployeeModal')) {
                closeAddEmployeeModal();
            }
        }

        // 加载批注
        async function loadNotes(reportId) {
            const res = await fetch(`/api/reports/${reportId}/notes`);
            const data = await res.json();
            const container = document.getElementById('notesList');

            if (data.success && data.data.length > 0) {
                container.innerHTML = '<h4>💬 历史批注</h4>' + data.data.map(n => `
                    <div class="note-item">
                        <div class="note-content">${n.content}</div>
                        <div class="note-time">${n.created_at}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '';
            }
        }

        // 提交批注
        async function submitNote() {
            const content = document.getElementById('adminNote').value.trim();
            if (!content) {
                showToast('请输入批注内容', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/reports/${currentReportId}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('adminNote').value = '';
                    await loadNotes(currentReportId);
                    showToast('批注已添加');
                }
            } catch (err) {
                showToast('添加失败', 'error');
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('reportModal').classList.add('hidden');
        }

        // 切换标签页
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // 更新图表
        function updateCharts(stats) {
            updateDeptChart(stats.deptStats);
            updateTrendChart(stats.dailyTrend);
            updateCompletionChart(stats.completionStats || []);
        }

        function updateDeptChart(data) {
            const ctx = document.getElementById('deptChart').getContext('2d');
            if (charts.dept) charts.dept.destroy();

            charts.dept = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.department),
                    datasets: [{
                        label: '提交数',
                        data: data.map(d => d.report_count),
                        backgroundColor: ['#6366F1', '#8B5CF6', '#EC4899', '#F59E0B', '#10B981'],
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateTrendChart(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (charts.trend) charts.trend.destroy();

            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.report_date).reverse(),
                    datasets: [{
                        label: '提交数',
                        data: data.map(d => d.count).reverse(),
                        borderColor: '#6366F1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#6366F1',
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateCompletionChart(data) {
            const ctx = document.getElementById('completionChart').getContext('2d');
            if (charts.completion) charts.completion.destroy();

            charts.completion = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.completion_status),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: ['#10B981', '#F59E0B', '#6366F1', '#EF4444', '#8B5CF6'],
                        borderWidth: 0,
                        hoverOffset: 8
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // 加载员工列表
        async function loadEmployees() {
            const res = await fetch('/api/employees');
            const data = await res.json();
            if (data.success) {
                employees = data.data;
                renderEmployeeList();
            }
        }

        // 渲染员工列表
        function renderEmployeeList() {
            const container = document.getElementById('employeeList');
            container.innerHTML = employees.map(emp => `
                <div class="employee-card-item">
                    <div class="emp-avatar-lg">${emp.name.charAt(0)}</div>
                    <div class="emp-info">
                        <span class="emp-name">${emp.name}</span>
                        <span class="emp-dept">${emp.department}</span>
                    </div>
                    <button onclick="deleteEmployee(${emp.id})" class="btn-icon btn-danger-icon" title="删除">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        // 显示添加员工弹窗
        function showAddEmployee() {
            document.getElementById('addEmployeeModal').classList.remove('hidden');
        }

        function closeAddEmployeeModal() {
            document.getElementById('addEmployeeModal').classList.add('hidden');
        }

        // 添加员工
        async function addEmployee() {
            const name = document.getElementById('newEmpName').value.trim();
            const dept = document.getElementById('newEmpDept').value;

            if (!name) {
                showToast('请输入姓名', 'error');
                return;
            }

            try {
                const res = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, department: dept })
                });
                const data = await res.json();
                if (data.success) {
                    closeAddEmployeeModal();
                    loadEmployees();
                    loadStats();
                    showToast('添加成功');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('添加失败', 'error');
            }
        }

        // 删除员工
        async function deleteEmployee(id) {
            if (!confirm('确定要删除该成员吗？')) return;

            try {
                const res = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadEmployees();
                    loadStats();
                    loadReports();
                    showToast('已删除');
                }
            } catch (err) {
                showToast('删除失败', 'error');
            }
        }

        // 防抖搜索
        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadReports, 500);
        }

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===================== 今日智览 =====================
        let overviewReports = [];

        async function loadOverview() {
            const date = document.getElementById('filterDate').value;
            try {
                const [empRes, repRes] = await Promise.all([
                    fetch('/api/employees'),
                    fetch(`/api/reports/all?date=${date}`)
                ]);
                const empData = await empRes.json();
                const repData = await repRes.json();

                if (empData.success && repData.success) {
                    employees = empData.data;
                    overviewReports = repData.data;
                    renderOverviewMetrics();
                    renderOverviewSubmitList();
                    renderOverviewWorkHighlights();
                    renderOverviewDifficulties();
                    renderOverviewPlans();
                }
            } catch (err) {
                console.error('今日智览加载失败', err);
            }
        }

        // 更新顶部统计卡片后同步智览
        const origUpdateStatsCards = updateStatsCards;
        updateStatsCards = function(stats) {
            origUpdateStatsCards(stats);
            document.getElementById('overviewSubmitted').textContent = stats.todayStats.submitted + '/' + stats.todayStats.total;
            document.getElementById('overviewTotal').textContent = stats.todayStats.total;
        };

        // 数字概览
        function renderOverviewMetrics() {
            const total = employees.length;
            const submitted = overviewReports.length;
            const rate = total > 0 ? Math.round((submitted / total) * 100) : 0;

            document.getElementById('overviewSubmitted').textContent = submitted + '/' + total;
            document.getElementById('overviewTotal').textContent = total;

            // 任务总数 & 完成率
            let totalTasks = 0;
            let doneOrProgress = 0;
            overviewReports.forEach(r => {
                try {
                    const tasks = JSON.parse(r.tasks || '[]');
                    totalTasks += tasks.length;
                    tasks.forEach(t => {
                        if (t.status === '已完成' || t.status === '进行中' || t.status === '部分完成') {
                            doneOrProgress++;
                        }
                    });
                } catch (e) {}
            });
            document.getElementById('overviewTaskCount').textContent = totalTasks;
            const doneRate = totalTasks > 0 ? Math.round((doneOrProgress / totalTasks) * 100) : 0;
            document.getElementById('overviewDoneRate').textContent = doneRate + '%';
        }

        // 提交状态列表
        function renderOverviewSubmitList() {
            const container = document.getElementById('overviewSubmitList');
            const submittedIds = new Set(overviewReports.map(r => r.employee_id));

            const rows = employees.map(emp => {
                const submitted = submittedIds.has(emp.id);
                const rep = overviewReports.find(r => r.employee_id === emp.id);
                return { ...emp, submitted, rep };
            });

            if (rows.length === 0) {
                container.innerHTML = '<div class="overview-empty">暂无数据</div>';
                return;
            }

            container.innerHTML = rows.map(emp => {
                const submitTime = emp.submitted && emp.rep && emp.rep.created_at
                    ? new Date(emp.rep.created_at).toLocaleString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
                    : '';
                const badge = emp.submitted
                    ? `<span class="overview-badge overview-badge-green">${submitTime ? '已提交 ' + submitTime : '已提交'}</span>`
                    : '<span class="overview-badge overview-badge-gray">未提交</span>';
                return `
                    <div class="overview-submit-row">
                        <div class="overview-avatar ${emp.submitted ? '' : 'overview-avatar-absent'}">${emp.name.charAt(0)}</div>
                        <span class="overview-emp-name ${emp.submitted ? '' : 'overview-emp-name-muted'}">${emp.name}</span>
                        <span class="overview-emp-dept">${emp.department}</span>
                        ${badge}
                    </div>
                `;
            }).join('');
        }

        // 工作重点（词云）
        function renderOverviewWorkHighlights() {
            const container = document.getElementById('overviewWorkHighlights');
            const wordCount = {};

            overviewReports.forEach(r => {
                try {
                    const tasks = JSON.parse(r.tasks || '[]');
                    tasks.forEach(t => {
                        if (!t.desc) return;
                        // 简单分词：按空格、逗号、顿号分
                        const words = t.desc.split(/[\s,，、]/).filter(w => w.length >= 2);
                        words.forEach(w => {
                            wordCount[w] = (wordCount[w] || 0) + 1;
                        });
                    });
                } catch (e) {}
            });

            const sorted = Object.entries(wordCount).sort((a, b) => b[1] - a[1]);
            const top = sorted.slice(0, 20);

            if (top.length === 0) {
                container.innerHTML = '<div class="overview-empty">暂无任务数据</div>';
                return;
            }

            const maxCount = top[0][1];
            container.innerHTML = top.map(([word, count]) => {
                const ratio = count / maxCount;
                const fontSize = 11 + Math.round(ratio * 5);
                const opacity = 0.6 + ratio * 0.4;
                return `<span class="overview-tag" style="font-size:${fontSize}px;opacity:${opacity}">${word}</span>`;
            }).join('');
        }

        // 困难汇总
        function renderOverviewDifficulties() {
            const container = document.getElementById('overviewDifficulties');
            const items = overviewReports.filter(r => r.difficulties && r.difficulties.trim());

            if (items.length === 0) {
                container.innerHTML = '<div class="overview-empty">今日无困难反馈</div>';
                return;
            }

            container.innerHTML = items.map(r => {
                const city = r.department.includes('南昌') ? '南昌' :
                             r.department.includes('太原') ? '太原' :
                             r.department.includes('晋中') ? '晋中' :
                             r.department.includes('长沙') ? '长沙' : '';
                return `
                    <div class="overview-issue-item">
                        <div class="overview-issue-content">${escapeHtml(r.difficulties)}</div>
                        <div class="overview-issue-meta">${r.employee_name}${city ? ' · ' + city : ''}</div>
                    </div>
                `;
            }).join('');
        }

        // 明日计划
        function renderOverviewPlans() {
            const container = document.getElementById('overviewPlans');
            const items = overviewReports.filter(r => r.next_plan && r.next_plan.trim());

            if (items.length === 0) {
                container.innerHTML = '<div class="overview-empty">暂无明日计划</div>';
                return;
            }

            container.innerHTML = items.map(r => {
                const city = r.department.includes('南昌') ? '南昌' :
                             r.department.includes('太原') ? '太原' :
                             r.department.includes('晋中') ? '晋中' :
                             r.department.includes('长沙') ? '长沙' : '';
                return `
                    <div class="overview-plan-item">
                        <div class="overview-plan-content">${escapeHtml(r.next_plan)}</div>
                        <div class="overview-plan-meta">${r.employee_name}${city ? ' · ' + city : ''}</div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

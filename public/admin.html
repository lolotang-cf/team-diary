<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理看板 - 工作日报系统</title>
    <link rel="stylesheet" href="/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- 顶部导航 -->
        <header class="admin-header">
            <div class="header-left">
                <div class="header-icon">📊</div>
                <div>
                    <h1>管理看板</h1>
                    <p class="subtitle">团队工作日报实时监控</p>
                </div>
            </div>
            <div class="header-right">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span id="currentTime"></span>
                </div>
                <button onclick="location.reload()" class="btn-icon" title="刷新">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                </button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <section class="stats-grid">
            <div class="stat-card stat-blue">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="totalEmployees">-</span>
                    <span class="stat-label">团队总人数</span>
                </div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="todaySubmitted">-</span>
                    <span class="stat-label">今日已提交</span>
                </div>
            </div>
            <div class="stat-card stat-purple">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="todayRate">-%</span>
                    <span class="stat-label">提交率</span>
                </div>
            </div>
            <div class="stat-card stat-orange">
                <div class="stat-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="avgProgress">-%</span>
                    <span class="stat-label">平均进度</span>
                </div>
            </div>
        </section>

        <!-- 筛选器 -->
        <section class="filters-bar">
            <div class="filter-item">
                <label>📅 日期</label>
                <input type="date" id="filterDate" onchange="loadReports(); loadOverview();">
            </div>
            <div class="filter-item">
                <label>🏢 部门</label>
                <select id="filterDept" onchange="loadReports()">
                    <option value="">全部部门</option>
                    <option value="南昌人才发展主管">南昌人才发展主管</option>
                    <option value="太原人才发展主管">太原人才发展主管</option>
                    <option value="太原培训与人才发展主管">太原培训与人才发展主管</option>
                    <option value="太原培训专员">太原培训专员</option>
                    <option value="晋中培训专员">晋中培训专员</option>
                    <option value="长沙培训专员">长沙培训专员</option>
                </select>
            </div>
            <div class="filter-item filter-search">
                <label>🔍 搜索</label>
                <input type="text" id="filterKeyword" placeholder="搜索员工/内容..." onkeyup="debounceSearch()">
            </div>
            <button onclick="loadReports()" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                查询
            </button>
        </section>

        <!-- 标签页 -->
        <nav class="tabs">
            <button class="tab active" onclick="switchTab('overview', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                今日智览
            </button>
            <button class="tab" onclick="switchTab('reports', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                日报列表
            </button>
            <button class="tab" onclick="switchTab('stats', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                统计图表
            </button>
            <button class="tab" onclick="switchTab('team', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                团队管理
            </button>
        </nav>

        <!-- 今日智览 -->
        <section class="tab-content active" id="overviewTab">
            <!-- 数字概览 -->
            <div class="overview-metrics" id="overviewMetrics">
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewSubmitted">-</div>
                    <div class="overview-metric-label">今日提交</div>
                </div>
                <div class="overview-metric-divider"></div>
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewTotal">-</div>
                    <div class="overview-metric-label">团队总人数</div>
                </div>
                <div class="overview-metric-divider"></div>
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewTaskCount">-</div>
                    <div class="overview-metric-label">任务总数</div>
                </div>
                <div class="overview-metric-divider"></div>
                <div class="overview-metric-card">
                    <div class="overview-metric-value" id="overviewDoneRate" style="color:#3B6D11">-</div>
                    <div class="overview-metric-label">完成/进行中</div>
                </div>
            </div>

            <div class="overview-grid">
                <!-- 提交状态 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            提交状态
                        </h3>
                    </div>
                    <div id="overviewSubmitList" class="overview-submit-list"></div>
                </div>

                <!-- 工作重点 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                            工作重点
                        </h3>
                    </div>
                    <div id="overviewWorkHighlights" class="overview-tag-cloud"></div>
                </div>
            </div>

            <div class="overview-grid">
                <!-- 困难汇总 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            遇到的困难
                        </h3>
                    </div>
                    <div id="overviewDifficulties" class="overview-issue-list"></div>
                </div>

                <!-- 明日计划 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                            明日计划
                        </h3>
                    </div>
                    <div id="overviewPlans" class="overview-plan-list"></div>
                </div>
            </div>
        </section>

        <!-- 日报列表 -->
        <section class="tab-content" id="reportsTab">
            <div class="card">
                <div class="card-header">
                    <h3>📋 日报列表</h3>
                    <span class="report-count" id="reportCount"></span>
                </div>
                <div class="table-responsive">
                    <table class="reports-table">
                        <thead>
                            <tr>
                                <th>员工</th>
                                <th>部门</th>
                                <th>日期</th>
                                <th>提交时间</th>
                                <th>任务数</th>
                                <th>任务摘要</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reportsBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 统计图表 -->
        <section class="tab-content" id="statsTab">
            <div class="charts-grid">
                <div class="card chart-card">
                    <h3>📊 部门任务分布</h3>
                    <canvas id="deptChart"></canvas>
                </div>
                <div class="card chart-card">
                    <h3>📈 每日提交趋势</h3>
                    <canvas id="trendChart"></canvas>
                </div>
                <div class="card chart-card chart-card-wide">
                    <h3>🧠 AI工作项归集</h3>
                    <p class="chart-desc">智能归集类似工作项，发现可合并的高重合任务</p>
                    <div id="taskClustering" class="task-clustering">
                        <div class="loading-text">正在分析工作项...</div>
                    </div>
                </div>
                <div class="card chart-card">
                    <h3>🎯 达成情况</h3>
                    <canvas id="achievementChart"></canvas>
                </div>
            </div>
        </section>

        <!-- 团队管理 -->
        <section class="tab-content" id="teamTab">
            <div class="card">
                <div class="card-header">
                    <h3>👥 团队成员</h3>
                    <button onclick="showAddEmployee()" class="btn btn-primary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        添加成员
                    </button>
                </div>
                <div class="employee-grid" id="employeeList"></div>
            </div>
        </section>
    </div>

    <!-- 日报详情弹窗 -->
    <div class="modal-overlay hidden" id="reportModal" onclick="closeModalOnOverlay(event)">
        <div class="modal">
            <div class="modal-header">
                <h3>📋 日报详情</h3>
                <button onclick="closeModal()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <h4>💬 添加批注</h4>
                <textarea id="adminNote" rows="3" placeholder="输入批注内容..."></textarea>
                <button onclick="submitNote()" class="btn btn-primary">发送批注</button>
            </div>
            <div class="notes-list" id="notesList"></div>
        </div>
    </div>

    <!-- 添加员工弹窗 -->
    <div class="modal-overlay hidden" id="addEmployeeModal" onclick="closeAddEmployeeModalOnOverlay(event)">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>➕ 添加成员</h3>
                <button onclick="closeAddEmployeeModal()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="newEmpName" placeholder="输入成员姓名">
                </div>
                <div class="form-group">
                    <label>部门/职位</label>
                    <select id="newEmpDept">
                        <option value="南昌人才发展主管">南昌人才发展主管</option>
                        <option value="太原人才发展主管">太原人才发展主管</option>
                        <option value="太原培训与人才发展主管">太原培训与人才发展主管</option>
                        <option value="太原培训专员">太原培训专员</option>
                        <option value="晋中培训专员">晋中培训专员</option>
                        <option value="长沙培训专员">长沙培训专员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="addEmployee()" class="btn btn-primary" style="width:100%">确认添加</button>
            </div>
        </div>
    </div>

    <!-- AI工作项归集详情弹窗 -->
    <div class="modal-overlay hidden" id="clusterDetailModal" onclick="closeClusterDetailOnOverlay(event)">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>🔍 工作项归集详情</h3>
                <button onclick="closeClusterDetail()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="clusterDetailBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 全局变量
        let socket = null;
        let currentReportId = null;
        let employees = [];
        let charts = {};

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            setDefaultDate();
            loadStats();
            loadReports();
            loadEmployees();
            loadOverview();
            startClock();
            clusterTasks(); // 启动AI归集分析
        });

        // Socket.IO
        function initSocket() {
            socket = io();
            socket.on('report_added', (data) => {
                showToast(`${data.employee_name} 提交了新日报`);
                loadReports();
                loadStats();
                loadOverview();
                clusterTasks();
            });
            socket.on('report_updated', (data) => {
                loadReports();
                loadStats();
                loadOverview();
                clusterTasks();
            });
            socket.on('report_deleted', (data) => {
                showToast('有日报被删除');
                loadReports();
                loadStats();
                loadOverview();
            });
        }

        // 时钟
        function startClock() {
            setInterval(() => {
                document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
            }, 1000);
        }

        // 设置默认日期
        function setDefaultDate() {
            document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
        }

        // 加载统计
        async function loadStats() {
            const today = new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`/api/stats?start_date=${getDateRange()}&end_date=${today}`);
                const data = await res.json();
                if (data.success) {
                    updateStatsCards(data.data);
                    updateCharts(data.data);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function getDateRange() {
            const date = new Date();
            date.setDate(date.getDate() - 30);
            return date.toISOString().split('T')[0];
        }

        // 更新统计卡片
        function updateStatsCards(stats) {
            document.getElementById('totalEmployees').textContent = stats.todayStats.total;
            document.getElementById('todaySubmitted').textContent = stats.todayStats.submitted;
            document.getElementById('todayRate').textContent = stats.todayStats.rate + '%';

            const totalProgress = stats.deptStats.reduce((sum, d) => sum + (d.avg_progress || 0), 0);
            const avgP = stats.deptStats.length > 0 ? Math.round(totalProgress / stats.deptStats.length) : 0;
            document.getElementById('avgProgress').textContent = avgP + '%';
        }

        // 加载日报列表
        async function loadReports() {
            const date = document.getElementById('filterDate').value;
            const dept = document.getElementById('filterDept').value;
            const keyword = document.getElementById('filterKeyword').value;

            let url = '/api/reports/all?';
            if (date) url += `date=${date}&`;
            if (dept) url += `department=${dept}&`;
            if (keyword) url += `keyword=${encodeURIComponent(keyword)}&`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    renderReports(data.data);
                    document.getElementById('reportCount').textContent = `共 ${data.data.length} 条`;
                }
            } catch (err) {
                showToast('加载失败', 'error');
            }
        }

        // 渲染日报列表
        function renderReports(reports) {
            const tbody = document.getElementById('reportsBody');
            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = reports.map(r => {
                let tasks = [];
                try {
                    tasks = JSON.parse(r.tasks || '[]');
                } catch (e) {
                    tasks = [];
                }
                const taskCount = tasks.length;
                const taskSummary = tasks.slice(0, 2).map(t => t.desc).join('; ');
                
                return `
                <tr onclick="showReportDetail(${r.id})">
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar">${r.employee_name.charAt(0)}</div>
                            <span>${r.employee_name}</span>
                        </div>
                    </td>
                    <td><span class="dept-badge">${r.department}</span></td>
                    <td><span class="date-text">${r.report_date}</span></td>
                    <td><span class="date-text">${r.created_at ? new Date(r.created_at).toLocaleString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '-'}</span></td>
                    <td><span class="task-count">${taskCount} 项</span></td>
                    <td class="task-cell">${taskSummary ? taskSummary.substring(0, 50) + (taskSummary.length > 50 ? '...' : '') : '-'}</td>
                    <td>
                        <button onclick="event.stopPropagation(); showReportDetail(${r.id})" class="btn btn-sm btn-outline">查看</button>
                        <button onclick="event.stopPropagation(); deleteReport(${r.id})" class="btn btn-sm btn-danger">删除</button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function getProgressClass(p) {
            if (p >= 100) return 'complete';
            if (p >= 50) return 'mid';
            return 'low';
        }

        function getStatusClass(status) {
            if (status === '已完成') return 'status-green';
            if (status === '进行中' || status === '部分完成') return 'status-yellow';
            if (status === '已延期') return 'status-red';
            return 'status-gray';
        }

        // 显示日报详情
        async function showReportDetail(id) {
            currentReportId = id;
            const res = await fetch(`/api/reports/all`);
            const data = await res.json();
            const report = data.data.find(r => r.id === id);

            if (!report) return;

            let tasksHtml = '';
            try {
                const tasks = JSON.parse(report.tasks || '[]');
                if (tasks.length > 0) {
                    tasksHtml = '<div class="detail-block"><span class="detail-label">📌 工作任务</span>';
                    tasks.forEach((task, index) => {
                        tasksHtml += `
                            <div class="task-detail-item">
                                <div class="task-detail-header">
                                    <span class="task-detail-num">任务 ${index + 1}</span>
                                    <span class="task-detail-status ${getStatusClass(task.status)}">${task.status || '未设置'}</span>
                                </div>
                                <div class="task-detail-desc">${task.desc || '无描述'}</div>
                            </div>
                        `;
                    });
                    tasksHtml += '</div>';
                }
            } catch (e) {
                tasksHtml = '';
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <span class="detail-label">员工</span>
                        <span class="detail-value">${report.employee_name}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">部门</span>
                        <span class="detail-value">${report.department}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">日期</span>
                        <span class="detail-value">${report.report_date}</span>
                    </div>
                </div>
                ${tasksHtml}
                ${report.achievement ? `<div class="detail-block"><span class="detail-label">🏆 达成情况</span><div class="detail-content">${report.achievement}</div></div>` : ''}
                ${report.difficulties ? `<div class="detail-block"><span class="detail-label">🚧 遇到困难</span><div class="detail-content has-issue">${report.difficulties}</div></div>` : ''}
                ${report.next_plan ? `<div class="detail-block"><span class="detail-label">💡 明日计划</span><div class="detail-content">${report.next_plan}</div></div>` : ''}
                ${report.notes ? `<div class="detail-block"><span class="detail-label">📝 备注</span><div class="detail-content">${report.notes}</div></div>` : ''}
            `;

        // ==================== AI工作项归集功能 ====================

        // 停用词列表（单字虚词 + 常见无意义词）
        const stopWords = new Set([
            // 单字虚词
            '的','了','是','在','和','与','及','等','将','已','也','都','把','被','对','向',
            '从','到','让','给','用','有','没','不','很','就','去','来','而','但','或','又',
            // 双字虚词/动词

            '参与','协助','配合','情况','内容','包括','以及','或者','同时','并且','继续',
            '跟进','做好','部分','主要','通过','根据','按照','由于','关于','对于','为了',
            '今日','今天','本周','本月','目前','现在','当前','当月','进行中','推进','整理',
            '梳理','优化','完善','数据','信息','资料','文档','报告','方案','计划','总结',
            '汇总','统计','人员','员工','同事','领导','部门','公司','集团','经理','主管',
            '确认','核实','检查','审核','审批','同意','协调','沟通','交流','其他','其它',
            '各类','各种','多个','若干','一定','一些','问题','情况','开始','安排','结果',
            '过程','阶段','工作','开会','会议','参加','记录','填写','提交','上报','反馈',
            '落实','执行','支持','保证','确保','做到','做了','做完','已完','已做'
        ]);

        // 把文本切分为纯中文"段"（连续汉字序列），供相似度计算使用
        function tokenizeChinese(text) {
            if (!text) return [];
            // 提取所有连续中文片段
            const segments = text.match(/[\u4e00-\u9fa5]{2,}/g) || [];
            const words = new Set();
            segments.forEach(seg => {
                // 对每个连续汉字段做2-4字滑动窗口，仅用于相似度计算
                for (let i = 0; i < seg.length; i++) {
                    for (let wlen = 2; wlen <= 4 && i + wlen <= seg.length; wlen++) {
                        const word = seg.substring(i, i + wlen);
                        if (!stopWords.has(word)) words.add(word);
                    }
                }
            });
            return [...words];
        }

        // 从单条文本中提取精准关键词（不用频率，用"最长不被包含"策略）
        function extractKeywords(text) {
            if (!text) return [];
            // 1. 提取所有连续中文段
            const segments = text.match(/[\u4e00-\u9fa5]{2,}/g) || [];
            if (segments.length === 0) return [];

            // 2. 收集所有2-5字候选词
            const candidates = new Set();
            segments.forEach(seg => {
                for (let i = 0; i < seg.length; i++) {
                    for (let wlen = 2; wlen <= 5 && i + wlen <= seg.length; wlen++) {
                        const word = seg.substring(i, i + wlen);
                        if (!stopWords.has(word)) candidates.add(word);
                    }
                }
            });

            // 3. 去掉"被更长词包含"的子串（精华去冗余）
            //    例如："客服工单"已有，则"客服"、"工单"、"客服工"、"服工单"都去掉
            const arr = [...candidates].sort((a, b) => b.length - a.length);
            const kept = [];
            arr.forEach(word => {
                // 若当前词是某个已保留词的子串，丢弃
                const isSubstr = kept.some(longer => longer.includes(word));
                if (!isSubstr) kept.push(word);
            });

            // 4. 优先留较长词（更具语义），取前5个
            return kept.slice(0, 5);
        }

        // 计算两个文本的相似度（基于词重叠 Jaccard）
        function calculateSimilarity(text1, text2) {
            const words1 = new Set(tokenizeChinese(text1));
            const words2 = new Set(tokenizeChinese(text2));
            if (words1.size === 0 || words2.size === 0) return 0;
            const intersection = new Set([...words1].filter(x => words2.has(x)));
            const union = new Set([...words1, ...words2]);
            return intersection.size / union.size;
        }

        // 从日报中提取工作项并聚类
        async function clusterTasks() {
            try {
                // 获取所有日报
                const res = await fetch('/api/reports/all');
                const data = await res.json();
                
                if (!data.success || data.data.length === 0) {
                    document.getElementById('taskClustering').innerHTML = 
                        '<div class="empty-state">暂无数据可供分析</div>';
                    return;
                }

                // 提取所有工作项
                let allTasks = [];
                data.data.forEach(report => {
                    try {
                        const tasks = JSON.parse(report.tasks || '[]');
                        tasks.forEach(task => {
                            if (task.desc && task.desc.trim()) {
                                allTasks.push({
                                    desc: task.desc.trim(),
                                    employee: report.employee_name,
                                    department: report.department,
                                    date: report.report_date,
                                    status: task.status || '未设置'
                                });
                            }
                        });
                    } catch (e) {}
                });

                if (allTasks.length === 0) {
                    document.getElementById('taskClustering').innerHTML = 
                        '<div class="empty-state">暂无工作项数据</div>';
                    return;
                }

                // 基于相似度聚类
                const clusters = [];
                const used = new Set();

                allTasks.forEach((task, idx) => {
                    if (used.has(idx)) return;
                    
                    const cluster = {
                        representative: task,
                        tasks: [task],
                        employees: new Set([task.employee]),
                        departments: new Set([task.department]),
                        keywords: extractKeywords(task.desc)
                    };
                    used.add(idx);

                    // 查找相似任务
                    allTasks.forEach((other, otherIdx) => {
                        if (used.has(otherIdx)) return;
                        
                        const similarity = calculateSimilarity(task.desc, other.desc);
                        if (similarity >= 0.3) { // 相似度阈值
                            cluster.tasks.push(other);
                            cluster.employees.add(other.employee);
                            cluster.departments.add(other.department);
                            used.add(otherIdx);
                        }
                    });

                    clusters.push(cluster);
                });

                // 按任务数量排序，取前12个聚类
                clusters.sort((a, b) => b.tasks.length - a.tasks.length);
                const topClusters = clusters.slice(0, 12);

                // 渲染归集结果
                renderTaskClusters(topClusters, allTasks.length);

            } catch (err) {
                console.error('聚类分析失败:', err);
                document.getElementById('taskClustering').innerHTML = 
                    '<div class="empty-state">分析失败，请重试</div>';
            }
        }

        // 渲染聚类结果

            currentClusters = clusters; // 保存到全局变量
            const container = document.getElementById('taskClustering');
            
            // 计算统计信息
            const highOverlap = clusters.filter(c => c.tasks.length >= 3);
            const uniqueTasks = clusters.filter(c => c.tasks.length === 1).length;
            
            let html = `
                <div class="cluster-summary">
                    <div class="cluster-stat">
                        <span class="cluster-stat-num">${clusters.length}</span>
                        <span class="cluster-stat-label">归集类别</span>
                    </div>

                        <span class="cluster-stat-label">高重合聚类</span>
                    </div>
                    <div class="cluster-stat">
                        <span class="cluster-stat-num">${totalTasks}</span>
                        <span class="cluster-stat-label">工作项总数</span>
                    </div>
                </div>
                <div class="cluster-list">
            `;

            clusters.forEach((cluster, idx) => {
                const overlapLevel = cluster.tasks.length >= 4 ? 'high' : 
                                    cluster.tasks.length >= 3 ? 'medium' : 
                                    cluster.tasks.length >= 2 ? 'low' : 'unique';
                
                const overlapText = overlapLevel === 'high' ? '高度重合' :
                                   overlapLevel === 'medium' ? '中度重合' :

                const overlapClass = overlapLevel === 'high' ? 'overlap-high' :
                                    overlapLevel === 'medium' ? 'overlap-medium' :
                                    overlapLevel === 'low' ? 'overlap-low' : 'overlap-unique';

                html += `
                    <div class="cluster-item" onclick="showClusterDetail(${idx})" style="cursor: pointer;">
                        <div class="cluster-header">
                            <span class="cluster-title">${escapeHtml(truncate(cluster.representative.desc, 30))}</span>
                            <span class="cluster-count">${cluster.tasks.length}次</span>
                            <span class="cluster-overlap ${overlapClass}">${overlapText}</span>
                        </div>
                        <div class="cluster-meta">
                            <span>涉及${cluster.employees.size}人 · ${cluster.departments.size}部门</span>
                            <span class="cluster-keywords">${cluster.keywords.length > 0 ? cluster.keywords.slice(0, 3).join(' ') : '<span style="color:#999;font-size:12px">暂无关键词</span>'}</span>
                        </div>
                        <div class="cluster-employees">
                            ${Array.from(cluster.employees).slice(0, 4).map(emp =>
                                `<span class="emp-tag">${emp}</span>`
                            ).join('')}
                            ${cluster.employees.size > 4 ? `<span class="emp-more">+${cluster.employees.size - 4}</span>` : ''}
                        </div>
                        <div class="cluster-suggestion">
                            ${overlapLevel !== 'unique' ? `<span class="suggestion-tag">建议合并优化</span>` : ''}
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

                    <div class="detail-summary-item">
                        <span class="detail-summary-label">归集主题</span>
                        <span class="detail-summary-value">${escapeHtml(cluster.representative.desc)}</span>
                    </div>
                    <div class="detail-summary-row">
                        <div class="detail-summary-item">
                            <span class="detail-summary-label">涉及人员</span>
                            <span class="detail-summary-value">${cluster.employees.size} 人</span>
                        </div>
                        <div class="detail-summary-item">
                            <span class="detail-summary-label">涉及部门</span>
                            <span class="detail-summary-value">${cluster.departments.size} 个</span>
                        </div>
                        <div class="detail-summary-item">
                            <span class="detail-summary-label">出现次数</span>
                            <span class="detail-summary-value">${cluster.tasks.length} 次</span>
                        </div>
                        <div class="detail-summary-item">
                            <span class="detail-summary-label">重合度</span>
                            <span class="detail-summary-value overlap-badge ${overlapLevel}">${overlapText}</span>
                        </div>
                    </div>
                    <div class="detail-summary-item">
                        <span class="detail-summary-label">关键词</span>
                        <span class="detail-summary-keywords">${cluster.keywords.length > 0 ? cluster.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('') : '<span style="color:#999;font-size:13px">暂无关键词</span>'}</span>
                    </div>
                </div>

                <div class="detail-tabs">
                    <button class="detail-tab active" onclick="switchDetailTab('employees', this)">👥 人员明细</button>
                    <button class="detail-tab" onclick="switchDetailTab('timeline', this)">📅 日期时间线</button>
                </div>

                <div class="detail-tab-content active" id="employeesTab">
                    ${employeeDetailsHtml}
                </div>

                <div class="detail-tab-content" id="timelineTab">
                    <div class="timeline-container">
                        ${timelineHtml}
                    </div>
                </div>
            `;

            document.getElementById('clusterDetailModal').classList.remove('hidden');
        }

        // 切换详情标签页
        function switchDetailTab(tab, btn) {
            document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.detail-tab-content').forEach(c => c.classList.remove('active'));

            btn.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // 关闭归集详情弹窗
        function closeClusterDetail() {
            document.getElementById('clusterDetailModal').classList.add('hidden');
        }

        function closeClusterDetailOnOverlay(event) {
            if (event.target === document.getElementById('clusterDetailModal')) {
                closeClusterDetail();
            }
        }

        function truncate(text, maxLen) {
            if (text.length <= maxLen) return text;
            return text.substring(0, maxLen) + '...';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 工具函数

        function updateAchievementChart(data) {
            const ctx = document.getElementById('achievementChart').getContext('2d');
            if (charts.achievement) charts.achievement.destroy();

            charts.achievement = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.achievement),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: ['#F59E0B', '#6366F1', '#10B981', '#EF4444'],
                        borderWidth: 0,
                        hoverOffset: 8
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // 加载员工列表
        async function loadEmployees() {
            const res = await fetch('/api/employees');
            const data = await res.json();
            if (data.success) {
                employees = data.data;
                renderEmployeeList();
            }
        }

        // 渲染员工列表
        function renderEmployeeList() {
            const container = document.getElementById('employeeList');
            container.innerHTML = employees.map(emp => `
                <div class="employee-card-item">
                    <div class="emp-avatar-lg">${emp.name.charAt(0)}</div>
                    <div class="emp-info">
                        <span class="emp-name">${emp.name}</span>
                        <span class="emp-dept">${emp.department}</span>
                    </div>
                    <button onclick="deleteEmployee(${emp.id})" class="btn-icon btn-danger-icon" title="删除">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        // 显示添加员工弹窗
        function showAddEmployee() {
            document.getElementById('addEmployeeModal').classList.remove('hidden');
        }

        function closeAddEmployeeModal() {
            document.getElementById('addEmployeeModal').classList.add('hidden');
        }

        // 添加员工
        async function addEmployee() {
            const name = document.getElementById('newEmpName').value.trim();
            const dept = document.getElementById('newEmpDept').value;

            if (!name) {
                showToast('请输入姓名', 'error');
                return;
            }

            try {
                const res = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, department: dept })
                });
                const data = await res.json();
                if (data.success) {
                    closeAddEmployeeModal();
                    loadEmployees();
                    loadStats();
                    showToast('添加成功');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('添加失败', 'error');
            }
        }

        // 删除日报
        async function deleteReport(id) {
            if (!confirm('确定要删除这条日报吗？此操作不可恢复。')) return;

            try {
                const res = await fetch(`/api/reports/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    showToast('日报已删除');
                    loadReports();
                    loadStats();
                    loadOverview();
                    if (currentReportId === id) {
                        closeModal();
                    }
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('删除失败', 'error');
            }
        }

        // 删除员工
        async function deleteEmployee(id) {
            if (!confirm('确定要删除该成员吗？')) return;

            try {
                const res = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadEmployees();
                    loadStats();
                    loadReports();
                    showToast('已删除');
                }
            } catch (err) {
                showToast('删除失败', 'error');
            }
        }

        // 防抖搜索
        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadReports, 500);
        }

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

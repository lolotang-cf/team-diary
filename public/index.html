<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工工作日报</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>📝 工作日报</h1>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- 员工选择 -->
            <section class="section employee-select" id="employeeSelectSection">
                <h2>👋 请选择你的身份</h2>
                <div class="employee-grid" id="employeeList"></div>
                <div class="custom-employee">
                    <input type="text" id="customName" placeholder="或输入姓名（首次使用）">
                    <button onclick="addCustomEmployee()" class="btn btn-secondary">添加并进入</button>
                </div>
            </section>

            <!-- 日报填写 -->
            <section class="section diary-form hidden" id="diaryFormSection">
                <div class="form-header">
                    <h2>📋 填写工作日报</h2>
                </div>

                <form id="reportForm" class="report-form">
                    <!-- 日期 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 日期</label>
                            <input type="date" id="reportDate" required>
                        </div>
                    </div>

                    <!-- 工作任务列表 -->
                    <div class="form-group full-width">
                        <label>📌 工作任务 <span class="required">*</span></label>
                        <div id="tasksContainer">
                            <!-- 动态添加的任务项 -->
                        </div>
                        <button type="button" onclick="addTask()" class="btn btn-secondary btn-small">+ 添加任务</button>
                    </div>

                    <!-- 达成情况 -->
                    <div class="form-group">
                        <label>🏆 达成情况 <span class="required">*</span></label>
                        <select id="achievement" required>
                            <option value="">请选择</option>
                            <option value="超出预期">🌟 超出预期</option>
                            <option value="达成目标">🎯 达成目标</option>
                            <option value="接近目标">📈 接近目标</option>
                            <option value="未达目标">📉 未达目标</option>
                        </select>
                    </div>

                    <!-- 困难和建议 -->
                    <div class="form-group full-width">
                        <label>🚧 遇到困难 <span class="required">*</span></label>
                        <textarea id="difficulties" rows="3" placeholder="描述工作中遇到的问题或阻碍..." required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>💡 明日计划 <span class="required">*</span></label>
                        <textarea id="nextPlan" rows="3" placeholder="描述明日工作计划..." required></textarea>
                    </div>

                    <!-- 备注 -->
                    <div class="form-group full-width">
                        <label>📝 备注</label>
                        <textarea id="notes" rows="2" placeholder="其他补充说明..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-large">💾 提交日报</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- 提交成功弹窗 -->
    <div id="successModal" class="success-overlay hidden">
        <div class="success-modal">
            <div class="success-icon-wrap">
                <svg class="success-checkmark" viewBox="0 0 52 52">
                    <circle class="success-checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="success-checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h3 class="success-title">提交成功</h3>
            <p class="success-desc">日报已保存，感谢你的填写！</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 全局变量
        let currentEmployee = null;
        let socket = null;
        let employees = [];
        let taskCounter = 0;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            loadEmployees();
            setDefaultDate();
            initForm();
            addTask(); // 默认添加一个任务项
        });

        // 初始化 Socket.IO
        function initSocket() {
            socket = io();
            socket.on('report_updated', (data) => {
                if (currentEmployee && data.employee_id === currentEmployee.id) {
                    showToast('收到实时更新');
                }
            });
        }

        // 加载员工列表
        async function loadEmployees() {
            try {
                const res = await fetch('/api/employees');
                const data = await res.json();
                if (data.success) {
                    employees = data.data;
                    renderEmployees();
                }
            } catch (err) {
                showToast('加载员工列表失败', 'error');
            }
        }

        // 渲染员工列表
        function renderEmployees() {
            const container = document.getElementById('employeeList');
            container.innerHTML = employees.map(emp => `
                <div class="employee-card" onclick="selectEmployee(${emp.id})">
                    <div class="employee-avatar">${emp.name.charAt(0)}</div>
                    <div class="employee-info">
                        <span class="employee-name">${emp.name}</span>
                        <span class="employee-dept">${emp.department}</span>
                    </div>
                </div>
            `).join('');
        }

        // 选择员工
        async function selectEmployee(id) {
            const emp = employees.find(e => e.id === id);
            if (emp) {
                currentEmployee = emp;
                document.getElementById('currentUser').textContent = `👤 ${emp.name}`;
                document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');
                document.getElementById('employeeSelectSection').classList.add('hidden');
                document.getElementById('diaryFormSection').classList.remove('hidden');
                await loadTodayReport();
            }
        }

        // 添加自定义员工
        async function addCustomEmployee() {
            const name = document.getElementById('customName').value.trim();

            if (!name) {
                showToast('请输入姓名', 'error');
                return;
            }

            try {
                const res = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, department: '催收部' })
                });
                const data = await res.json();
                if (data.success) {
                    employees.push(data.data);
                    renderEmployees();
                    selectEmployee(data.data.id);
                    showToast('添加成功');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('添加失败', 'error');
            }
        }

        // 设置默认日期
        function setDefaultDate() {
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        }

        // 初始化表单
        function initForm() {
            document.getElementById('reportForm').addEventListener('submit', submitReport);
        }

        // 添加任务
        function addTask() {
            taskCounter++;
            const container = document.getElementById('tasksContainer');
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            taskDiv.id = `task-${taskCounter}`;
            taskDiv.innerHTML = `
                <div class="task-header">
                    <span class="task-number">任务 ${taskCounter}</span>
                    <button type="button" onclick="removeTask(${taskCounter})" class="btn-remove">✕ 删除</button>
                </div>
                <div class="task-content">
                    <textarea id="taskDesc-${taskCounter}" rows="2" placeholder="描述工作任务内容..." required class="task-desc"></textarea>
                </div>
                <div class="task-status">
                    <label>完成情况 <span class="required">*</span></label>
                    <select id="taskStatus-${taskCounter}" required class="task-status-select">
                        <option value="">请选择</option>
                        <option value="已完成">✅ 已完成</option>
                        <option value="部分完成">🔄 部分完成</option>
                        <option value="未完成">⏳ 未完成</option>
                        <option value="进行中">🔃 进行中</option>
                        <option value="已延期">⚠️ 已延期</option>
                    </select>
                </div>
            `;
            container.appendChild(taskDiv);
        }

        // 删除任务
        function removeTask(taskId) {
            const taskDiv = document.getElementById(`task-${taskId}`);
            const container = document.getElementById('tasksContainer');
            if (container.children.length > 1) {
                taskDiv.remove();
            } else {
                showToast('至少保留一个任务', 'error');
            }
        }

        // 加载今日日报
        async function loadTodayReport() {
            if (!currentEmployee) return;

            const today = new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`/api/reports/employee/${currentEmployee.id}?start_date=${today}&end_date=${today}`);
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    fillForm(data.data[0]);
                    showToast('已加载今日日报（可修改）');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 填充表单
        function fillForm(report) {
            document.getElementById('reportDate').value = report.report_date;
            
            // 清空现有任务
            const container = document.getElementById('tasksContainer');
            container.innerHTML = '';
            taskCounter = 0;
            
            // 解析任务数据（假设后端返回的是JSON字符串）
            let tasks = [];
            try {
                tasks = JSON.parse(report.tasks || '[]');
            } catch (e) {
                tasks = [];
            }
            
            if (tasks.length === 0) {
                addTask();
            } else {
                tasks.forEach(task => {
                    addTask();
                    const currentTask = taskCounter;
                    document.getElementById(`taskDesc-${currentTask}`).value = task.desc || '';
                    document.getElementById(`taskStatus-${currentTask}`).value = task.status || '';
                });
            }
            
            document.getElementById('achievement').value = report.achievement || '';
            document.getElementById('difficulties').value = report.difficulties || '';
            document.getElementById('nextPlan').value = report.next_plan || '';
            document.getElementById('notes').value = report.notes || '';
        }

        // 提交日报
        async function submitReport(e) {
            e.preventDefault();

            if (!currentEmployee) {
                showToast('请先选择员工', 'error');
                return;
            }

            // 收集所有任务
            const tasks = [];
            const taskItems = document.querySelectorAll('.task-item');
            taskItems.forEach(item => {
                const desc = item.querySelector('.task-desc').value.trim();
                const status = item.querySelector('.task-status-select').value;
                if (desc || status) {
                    tasks.push({ desc, status });
                }
            });

            if (tasks.length === 0) {
                showToast('请至少添加一个工作任务', 'error');
                return;
            }

            const formData = {
                employee_id: currentEmployee.id,
                report_date: document.getElementById('reportDate').value,
                tasks: JSON.stringify(tasks),
                achievement: document.getElementById('achievement').value,
                difficulties: document.getElementById('difficulties').value,
                next_plan: document.getElementById('nextPlan').value,
                notes: document.getElementById('notes').value
            };

            try {
                const res = await fetch('/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if (data.success) {
                    showSuccessModal();
                    socket.emit('submit_report', data.data);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('提交失败', 'error');
            }
        }

        // Toast 提示（用于错误/普通提示）
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 提交成功弹窗（SVG 打勾动画）
        let successModalTimer = null;
        function showSuccessModal() {
            const overlay = document.getElementById('successModal');
            overlay.classList.remove('hidden');
            // 强制重绘以触发动画
            void overlay.offsetWidth;
            overlay.classList.add('show');

            // 3秒后自动关闭
            if (successModalTimer) clearTimeout(successModalTimer);
            successModalTimer = setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => overlay.classList.add('hidden'), 400);
            }, 3000);
        }

        // 点击遮罩关闭弹窗
        document.getElementById('successModal').addEventListener('click', (e) => {
            if (e.target.id === 'successModal') {
                const overlay = document.getElementById('successModal');
                overlay.classList.remove('show');
                setTimeout(() => overlay.classList.add('hidden'), 400);
                if (successModalTimer) clearTimeout(successModalTimer);
            }
        });
    </script>
</body>
</html>

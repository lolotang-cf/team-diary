<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工工作日报</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>📝 工作日报</h1>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- 员工选择 -->
            <section class="section employee-select" id="employeeSelectSection">
                <h2>👋 请选择你的身份</h2>
                <div class="employee-grid" id="employeeList"></div>
                <div class="custom-employee">
                    <input type="text" id="customName" placeholder="或输入姓名（首次使用）">
                    <select id="customDept">
                        <option value="小赢前端催收">小赢前端催收</option>
                        <option value="小赢后端催收">小赢后端催收</option>
                        <option value="BPO催收">BPO催收</option>
                        <option value="其他">其他</option>
                    </select>
                    <button onclick="addCustomEmployee()" class="btn btn-secondary">添加并进入</button>
                </div>
            </section>

            <!-- 日报填写 -->
            <section class="section diary-form hidden" id="diaryFormSection">
                <div class="form-header">
                    <h2>📋 填写工作日报</h2>
                    <div class="form-actions">
                        <button onclick="loadHistory()" class="btn btn-secondary">📅 历史记录</button>
                        <button onclick="switchEmployee()" class="btn btn-outline">🔄 切换员工</button>
                    </div>
                </div>

                <form id="reportForm" class="report-form">
                    <!-- 日期 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 日期</label>
                            <input type="date" id="reportDate" required>
                        </div>
                    </div>

                    <!-- 主要内容 -->
                    <div class="form-group full-width">
                        <label>📌 今日任务内容 <span class="required">*</span></label>
                        <textarea id="taskContent" rows="4" placeholder="详细描述今日完成的工作任务..." required></textarea>
                    </div>

                    <!-- 进度 -->
                    <div class="form-group full-width">
                        <label>📊 完成进度 <span id="progressValue">0%</span></label>
                        <input type="range" id="progress" min="0" max="100" value="0" oninput="updateProgress()">
                        <div class="progress-labels">
                            <span>未开始</span>
                            <span>进行中</span>
                            <span>已完成</span>
                        </div>
                    </div>

                    <!-- 完成状态 -->
                    <div class="form-group">
                        <label>✅ 完成情况</label>
                        <select id="completionStatus">
                            <option value="">请选择</option>
                            <option value="已完成">✅ 已完成</option>
                            <option value="部分完成">🔄 部分完成</option>
                            <option value="未完成">⏳ 未完成</option>
                            <option value="进行中">🔃 进行中</option>
                            <option value="已延期">⚠️ 已延期</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>🏆 达成情况</label>
                        <select id="achievement">
                            <option value="">请选择</option>
                            <option value="超出预期">🌟 超出预期</option>
                            <option value="达成目标">🎯 达成目标</option>
                            <option value="接近目标">📈 接近目标</option>
                            <option value="未达目标">📉 未达目标</option>
                        </select>
                    </div>

                    <!-- 困难和建议 -->
                    <div class="form-group full-width">
                        <label>🚧 遇到困难</label>
                        <textarea id="difficulties" rows="3" placeholder="描述工作中遇到的问题或阻碍..."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>💡 明日计划</label>
                        <textarea id="nextPlan" rows="3" placeholder="描述明日工作计划..."></textarea>
                    </div>

                    <!-- 跟进结果 -->
                    <div class="form-group full-width">
                        <label>📞 跟进结果</label>
                        <textarea id="followResult" rows="2" placeholder="记录与客户的跟进结果..."></textarea>
                    </div>

                    <!-- 备注 -->
                    <div class="form-group full-width">
                        <label>📝 备注</label>
                        <textarea id="notes" rows="2" placeholder="其他补充说明..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-large">💾 提交日报</button>
                    </div>
                </form>
            </section>

            <!-- 历史记录 -->
            <section class="section history-section hidden" id="historySection">
                <div class="form-header">
                    <h2>📅 历史日报</h2>
                    <button onclick="closeHistory()" class="btn btn-secondary">← 返回</button>
                </div>
                <div id="historyList" class="history-list"></div>
            </section>
        </main>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 全局变量
        let currentEmployee = null;
        let socket = null;
        let employees = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            loadEmployees();
            setDefaultDate();
            initForm();
        });

        // 初始化 Socket.IO
        function initSocket() {
            socket = io();
            socket.on('report_updated', (data) => {
                if (currentEmployee && data.employee_id === currentEmployee.id) {
                    showToast('收到实时更新');
                }
            });
        }

        // 加载员工列表
        async function loadEmployees() {
            try {
                const res = await fetch('/api/employees');
                const data = await res.json();
                if (data.success) {
                    employees = data.data;
                    renderEmployees();
                }
            } catch (err) {
                showToast('加载员工列表失败', 'error');
            }
        }

        // 渲染员工列表
        function renderEmployees() {
            const container = document.getElementById('employeeList');
            container.innerHTML = employees.map(emp => `
                <div class="employee-card" onclick="selectEmployee(${emp.id})">
                    <div class="employee-avatar">${emp.name.charAt(0)}</div>
                    <div class="employee-info">
                        <span class="employee-name">${emp.name}</span>
                        <span class="employee-dept">${emp.department}</span>
                    </div>
                </div>
            `).join('');
        }

        // 选择员工
        async function selectEmployee(id) {
            const emp = employees.find(e => e.id === id);
            if (emp) {
                currentEmployee = emp;
                document.getElementById('currentUser').textContent = `👤 ${emp.name}`;
                document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');
                document.getElementById('employeeSelectSection').classList.add('hidden');
                document.getElementById('diaryFormSection').classList.remove('hidden');
                await loadTodayReport();
            }
        }

        // 添加自定义员工
        async function addCustomEmployee() {
            const name = document.getElementById('customName').value.trim();
            const dept = document.getElementById('customDept').value;

            if (!name) {
                showToast('请输入姓名', 'error');
                return;
            }

            try {
                const res = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, department: dept })
                });
                const data = await res.json();
                if (data.success) {
                    employees.push(data.data);
                    renderEmployees();
                    selectEmployee(data.data.id);
                    showToast('添加成功');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('添加失败', 'error');
            }
        }

        // 设置默认日期
        function setDefaultDate() {
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        }

        // 初始化表单
        function initForm() {
            document.getElementById('reportForm').addEventListener('submit', submitReport);
        }

        // 更新进度显示
        function updateProgress() {
            const value = document.getElementById('progress').value;
            document.getElementById('progressValue').textContent = value + '%';
        }

        // 加载今日日报
        async function loadTodayReport() {
            if (!currentEmployee) return;

            const today = new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`/api/reports/employee/${currentEmployee.id}?start_date=${today}&end_date=${today}`);
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    fillForm(data.data[0]);
                    showToast('已加载今日日报（可修改）');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 填充表单
        function fillForm(report) {
            document.getElementById('reportDate').value = report.report_date;
            document.getElementById('taskContent').value = report.task_content || '';
            document.getElementById('progress').value = report.progress || 0;
            document.getElementById('progressValue').textContent = (report.progress || 0) + '%';
            document.getElementById('completionStatus').value = report.completion_status || '';
            document.getElementById('achievement').value = report.achievement || '';
            document.getElementById('difficulties').value = report.difficulties || '';
            document.getElementById('nextPlan').value = report.next_plan || '';
            document.getElementById('followResult').value = report.follow_result || '';
            document.getElementById('notes').value = report.notes || '';
        }

        // 提交日报
        async function submitReport(e) {
            e.preventDefault();

            if (!currentEmployee) {
                showToast('请先选择员工', 'error');
                return;
            }

            const formData = {
                employee_id: currentEmployee.id,
                report_date: document.getElementById('reportDate').value,
                task_content: document.getElementById('taskContent').value,
                progress: parseInt(document.getElementById('progress').value),
                completion_status: document.getElementById('completionStatus').value,
                achievement: document.getElementById('achievement').value,
                difficulties: document.getElementById('difficulties').value,
                next_plan: document.getElementById('nextPlan').value,
                follow_result: document.getElementById('followResult').value,
                notes: document.getElementById('notes').value
            };

            try {
                const res = await fetch('/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    socket.emit('submit_report', data.data);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('提交失败', 'error');
            }
        }

        // 加载历史记录
        async function loadHistory() {
            if (!currentEmployee) return;

            document.getElementById('diaryFormSection').classList.add('hidden');
            document.getElementById('historySection').classList.remove('hidden');

            try {
                const res = await fetch(`/api/reports/employee/${currentEmployee.id}`);
                const data = await res.json();
                if (data.success) {
                    renderHistory(data.data);
                }
            } catch (err) {
                showToast('加载历史失败', 'error');
            }
        }

        // 渲染历史记录
        function renderHistory(reports) {
            const container = document.getElementById('historyList');
            if (reports.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
                return;
            }

            container.innerHTML = reports.map(r => `
                <div class="history-item">
                    <div class="history-header">
                        <span class="history-date">📅 ${r.report_date}</span>
                        <span class="history-progress ${getProgressClass(r.progress)}">${r.progress || 0}%</span>
                    </div>
                    <div class="history-content">${r.task_content || '无内容'}</div>
                    ${r.difficulties ? `<div class="history-difficulty">🚧 ${r.difficulties}</div>` : ''}
                    ${r.next_plan ? `<div class="history-plan">💡 明日计划：${r.next_plan}</div>` : ''}
                    <div class="history-meta">
                        <span>${r.completion_status || ''}</span>
                        <span>${r.achievement || ''}</span>
                    </div>
                </div>
            `).join('');
        }

        // 获取进度样式
        function getProgressClass(progress) {
            if (progress >= 100) return 'progress-complete';
            if (progress >= 50) return 'progress-mid';
            return 'progress-low';
        }

        // 关闭历史
        function closeHistory() {
            document.getElementById('historySection').classList.add('hidden');
            document.getElementById('diaryFormSection').classList.remove('hidden');
        }

        // 切换员工
        function switchEmployee() {
            currentEmployee = null;
            document.getElementById('diaryFormSection').classList.add('hidden');
            document.getElementById('employeeSelectSection').classList.remove('hidden');
            document.getElementById('reportForm').reset();
            setDefaultDate();
        }

        // Toast 提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
